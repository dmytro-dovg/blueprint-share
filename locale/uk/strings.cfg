[mod-name]
blueprint-share=Обмін кресленнями

[mod-description]
blueprint-share=Здійснює обмін кресленнями між двома клієнтами Factorio на одному пристрої через протокол UDP. Також підтримує книги креслень, плани знесення та плани поліпшення.

[mod-setting-name]
blueprint-share-auto-receive=Автоматичне отримання креслень
blueprint-share-destination-port=Порт призначення
blueprint-share-log-level=Рівень журналювання
blueprint-share-inbox-capacity=Місткість вхідних
blueprint-share-show-mod-gui-button=Показати кнопку вхідних

[mod-setting-description]
blueprint-share-auto-receive=Якщо увімкнено, вхідні креслення автоматично з'являються у курсорі. Не працює в редакторі мап і коли гру на паузі - натомість використовуйте гарячу клавішу __CONTROL__blueprint-share-receive__.
blueprint-share-destination-port=UDP-порт іншого клієнта Factorio, на який надсилаються креслення. Має збігатися з портом вказаним у --enable-lua-udp=<port>.
blueprint-share-log-level=Визначає кількість повідомлень у грі. "Тихо" вимикає всі повідомлення у грі.
blueprint-share-inbox-capacity=Кількість місць у вікні вхідних креслень.
blueprint-share-show-mod-gui-button=Показати кнопку вхідних у верхньому лівому куті інтерфейсу.

[string-mod-setting]
blueprint-share-log-level-quiet=Тихо
blueprint-share-log-level-error=Помилка
blueprint-share-log-level-warn=Попередження
blueprint-share-log-level-info=Інформація
blueprint-share-log-level-debug=Налагодження

[controls]
blueprint-share-send=Надіслати
blueprint-share-receive=Отримати вручну
blueprint-share-toggle-inbox=Відкрити вхідні

[blueprint-share]
blueprint-received=__1__ отримано!
blueprint-received-with-warnings=Отримано __1__ з попередженнями. Деякі об'єкти можуть бути відсутні.
hold-blueprint=Спочатку візьміть креслення.
sent=Надіслано __1__ на порт __2__.
unknown-item=Невідомий предмет
gui-empty=- порожньо -
gui-inbox-title=Вхідні креслення
gui-inbox-button-close-tooltip=Закрити __CONTROL__blueprint-share-toggle-inbox__
gui-inbox-toggle-tooltip=Відкрити/закрити вхідні __CONTROL__blueprint-share-toggle-inbox__
error-failed-to-send=Не вдалося надіслати __1__ на порт __2__.
error-payload-too-large=Креслення занадто велике.
error-import-failed=Помилка імпорту.
error-invalid-payload=Недійсні дані.
warning-version-mismatch=Увага! Отримано дані від іншої версії Factorio. Поточна: __1__. Інша: __2__.
warning-record-in-preview=Креслення у попередньому перегляді. Зачекайте на синхронізацію.
