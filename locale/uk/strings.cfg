[mod-name]
blueprint-share=Blueprint Share (Обмін кресленнями)

[mod-description]
blueprint-share=Здійснює обмін кресленнями між двома клієнтами Factorio на одному пристрої через протосол UDP. Також підтримує книги креслень, плани знесення та плани поліпшення.

[mod-setting-name]
blueprint-share-auto-receive=Автоматичне отримання креслень
blueprint-share-destination-port=Порт призначення
blueprint-share-debug=Налагодження

[mod-setting-description]
blueprint-share-auto-receive=Автоматично отримувати вхідні креслення. Якщо вимкнено, використовуйте гарячу клавішу для отримання вручну. Не працює в редакторі мап — використовуйте гарячу клавішу.
blueprint-share-destination-port=UDP-порт іншого клієнта Factorio, на який надсилаються креслення. Має збігатися з портом вказаним у --enable-lua-udp=<port>.

[controls]
blueprint-share-send=Надіслати креслення
blueprint-share-receive=Отримати креслення

[blueprint-share]
blueprint-received=__1__ отримано!
hold-blueprint=Спочатку візьміть креслення.
sent=Надіслано __1__ на порт __2__.
unknown-item=Невідомий предмет
error-payload-too-large=[color=red]Креслення занадтро велике.[/color]
error-import-failed=[color=red]Помилка імпорту.[/color]
error-invalid-payload=[color=red]Недійсні дані.[/color]
warning-version-mismatch=[color=yellow]Увага! Отримано дані від іншої версії Factorio. Поточна: __1__. Інша: __2__.[/color]
