[mod-name]
blueprint-share=Blueprint Share

[mod-description]
blueprint-share=Share blueprints between two Factorio instances on the same device over UDP. Also supports blueprint books, deconstruction planners, and upgrade planners.

[mod-setting-name]
blueprint-share-auto-receive=Auto-receive blueprints
blueprint-share-destination-port=Destination port
blueprint-share-log-level=Log level
blueprint-share-inbox-capacity=Inbox capacity

[mod-setting-description]
blueprint-share-auto-receive=Automatically receive incoming blueprints. When disabled, use the receive hotkey manually. This does not work in Map Editor, use the hotkey instead.
blueprint-share-destination-port=UDP port of the other Factorio instance to send blueprints to. Must be the same as set in --enable-lua-udp=<port>
blueprint-share-log-level=Controls the verbosity of in-game messages. "Quiet" disables all in-game messages.
blueprint-share-inbox-capacity=Тumber of slots in the received blueprints window.

[string-mod-setting]
blueprint-share-log-level-quiet=Quiet
blueprint-share-log-level-error=Error
blueprint-share-log-level-warn=Warning
blueprint-share-log-level-info=Info
blueprint-share-log-level-debug=Debug

[controls]
blueprint-share-send=Send
blueprint-share-receive=Receive manually
blueprint-share-toggle-inbox=Toggle inbox

[blueprint-share]
blueprint-received=__1__ received.
blueprint-received-with-warnings=Received __1__ with warnings. Some entities may be missing.
hold-blueprint=Hold a blueprint first.
sent=__1__ sent to port __2__.
unknown-item=Unknown item
gui-empty=- empty -
gui-inbox-title=Blueprint Share
error-failed-to-send=Could not send __1__ to port __2__.
error-payload-too-large=Blueprint is too large.
error-import-failed=Import failed.
error-invalid-payload=Invalid payload.
warning-version-mismatch=Warning! Received payload from mismatching Factorio version. Current: __1__. Other: __2__.
warning-record-in-preview=Blueprint is in preview. Wait until it is synchronised.
