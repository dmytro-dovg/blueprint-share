[mod-name]
blueprint-share=Blueprint Share

[mod-description]
blueprint-share=Share blueprints between two Factorio instances on the same device over UDP. Also supports blueprint books, deconstruction planners, and upgrade planners.

[mod-setting-name]
blueprint-share-auto-receive=Auto-receive blueprints
blueprint-share-destination-port=Destination port
blueprint-share-log-level=Log level
blueprint-share-inbox-capacity=Inbox capacity
blueprint-share-show-mod-gui-button=Show inbox button
blueprint-share-max-transfer-size=Max transfer size (KiB)

[mod-setting-description]
blueprint-share-auto-receive=When enabled, incoming blueprints automatically appear in your cursor. Does not work in Map Editor or while the game is paused - use the __CONTROL__blueprint-share-receive__ hotkey instead.
blueprint-share-destination-port=UDP port of the other Factorio instance to send blueprints to. Must be the same as set in --enable-lua-udp=<port>
blueprint-share-log-level=Controls the verbosity of in-game messages. "Quiet" disables all in-game messages.
blueprint-share-inbox-capacity=Number of slots in the inbox.
blueprint-share-show-mod-gui-button=Show inbox button in the top left corner of the user interface.
blueprint-share-max-transfer-size=Incoming and outgoing transfers larger than this are rejected. 0 is unlimited.

[string-mod-setting]
blueprint-share-log-level-quiet=Quiet
blueprint-share-log-level-error=Error
blueprint-share-log-level-warn=Warning
blueprint-share-log-level-info=Info
blueprint-share-log-level-debug=Debug

[shortcut-name]
blueprint-share-inbox=Blueprint inbox

[controls]
blueprint-share-send=Send
blueprint-share-receive=Receive manually
blueprint-share-toggle-inbox=Toggle inbox

